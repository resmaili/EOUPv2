# Environment for Earth Observation Using Python (EOUP), second edition (v2)
# Chapters 4-13: Data science and satellite imagery analysis
# Python 3.9+ required
name: eoupv2
channels:
  - conda-forge
dependencies:
  - python=3.14.4
  - cartopy=0.25.0
  - cfgrib=0.9.15.1
  - eccodes=2.46.0
  - h5netcdf=1.8.1
  - h5py=3.16.0
  - ipykernel=7.2.0
  - jupyter=1.1.1
  - jupyterlab=4.5.6
  - matplotlib=3.10.9
  - metpy=1.7.1
  - netcdf4=1.7.4
  - numpy=2.4.3
  - pandas=3.0.2
  - pyarrow=24.0.0
  - pvlib=0.15.1
  - pyresample=1.35.0
  - pygrib=2.1.8
  - pytorch=2.10.0
  - torchvision=0.26.0
  - rasterio=1.5.0
  - scikit-image=0.26.0
  - scikit-learn=1.8.0
  - scipy=1.17.1
  - xarray=2026.4.0
  - pip
  - pip:
    - satpy==0.60.0
    - datasets==4.8.4