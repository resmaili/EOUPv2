package:
  name: eoupv2
  version: 1.0.0

source:
  url: https://pypi.io/packages/source/e/eoupv2/eoupv2-1.0.0.tar.gz
  sha256: <get from PyPI after upload>

build:
  number: 0
  noarch: python
  script: python -m pip install --no-deps --ignore-installed .

requirements:
  host:
    - python >=3.9
    - pip
  run:
    - python >=3.9
    - cartopy >=0.20
    - matplotlib >=3.5
    - numpy >=1.20
    - pandas >=1.3
    - py6s >=1.9
    - pvlib >=0.9
    - satpy >=0.30
    - scipy >=1.7
    - scikit-learn >=1.0
    - torch >=1.9
    - torchvision >=0.10
    - xarray >=0.21

test:
  imports:
    - eoupv2

about:
  home: https://github.com/resmaili/EOUPv2
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'Earth Observations Using Python - Second Edition'
  description: |
    Notebooks and datasets for "Earth Observations Using Python v2"
  doc_url: https://github.com/resmaili/EOUPv2
  dev_url: https://github.com/resmaili/EOUPv2

extra:
  recipe-maintainers:
    - resmaili